<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect width="900" height="200" rx="12" fill="url(#grid)"/>
  <!-- Router icon with config arrows -->
  <g transform="translate(80, 60)">
    <!-- Router body -->
    <rect x="0" y="20" width="80" height="45" rx="6" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
    <!-- Antenna left -->
    <line x1="20" y1="20" x2="12" y2="2" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="12" cy="2" r="3" fill="rgba(255,255,255,0.9)"/>
    <!-- Antenna right -->
    <line x1="60" y1="20" x2="68" y2="2" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="68" cy="2" r="3" fill="rgba(255,255,255,0.9)"/>
    <!-- LEDs -->
    <circle cx="20" cy="36" r="3" fill="#4FC3F7"/>
    <circle cx="34" cy="36" r="3" fill="#4FC3F7"/>
    <circle cx="48" cy="36" r="3" fill="#4FC3F7"/>
    <circle cx="62" cy="36" r="3" fill="rgba(255,255,255,0.3)"/>
    <!-- Ports -->
    <rect x="12" y="50" width="10" height="6" rx="1" fill="rgba(255,255,255,0.4)"/>
    <rect x="27" y="50" width="10" height="6" rx="1" fill="rgba(255,255,255,0.4)"/>
    <rect x="42" y="50" width="10" height="6" rx="1" fill="rgba(255,255,255,0.4)"/>
    <rect x="57" y="50" width="10" height="6" rx="1" fill="rgba(255,255,255,0.4)"/>
    <!-- Config arrow right -->
    <line x1="90" y1="32" x2="115" y2="32" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round"/>
    <polyline points="110,26 118,32 110,38" fill="none" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Config arrow left -->
    <line x1="90" y1="52" x2="115" y2="52" stroke="#81D4FA" stroke-width="2" stroke-linecap="round"/>
    <polyline points="95,46 87,52 95,58" fill="none" stroke="#81D4FA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="310" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Router Express</text>
  <!-- Subtitle -->
  <text x="310" y="125" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">Auto-configuration services for ISP routers</text>
</svg>
